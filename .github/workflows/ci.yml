name: CI (Lint & Build)

on:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install --frozen-lockfile
          
      - name: Run lint
        run: bun run lint

      # - name: Run Test
      #   run: bun run test
        
      - name: Check build
        run: bun run build
