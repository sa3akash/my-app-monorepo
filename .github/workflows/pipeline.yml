name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  release:
    name: Auto Release
    if: github.event_name == 'push'
    uses: ./.github/workflows/release.yml
    secrets: inherit
    permissions:
      contents: write

  ci:
    name: Continuous Integration (Lint, Test & Build)
    # On push, wait for release to finish first. On PR, run immediately.
    needs: [release]
    if: always() && (needs.release.result == 'success' || needs.release.result == 'skipped')
    uses: ./.github/workflows/ci.yml

  docker:
    name: Docker Image (Scan & Push)
    needs: ci
    if: always() && needs.ci.result == 'success'
    uses: ./.github/workflows/docker.yml
    with:
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

