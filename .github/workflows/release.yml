name: Release (Auto Version)

on:
  workflow_call:
    outputs:
      tag:
        description: "The new version tag that was created"
        value: ${{ jobs.release.outputs.tag }}
      version:
        description: "The new version number (without v prefix)"
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Every push bumps patch by default (e.g. v1.0.4 → v1.0.5)
          # Use conventional commits to override:
          # feat: → minor | feat!: / BREAKING CHANGE: → major
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
